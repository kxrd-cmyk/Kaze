<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAZE | Shopping Cart</title>
    <style>
        @font-face {
            font-family: 'Hellshunx';
            src: url('./fonts/Hellshunx.ttf') format('truetype');
            font-weight: lighter;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .logo {
            font-size: 12rem;
            letter-spacing: 6px;
            margin-bottom: 0;
            position: relative;
            animation: fadeIn 2s ease-in-out;
            transition: transform 0.3s ease;
            font-family: 'Hellshunx', sans-serif;
            font-weight: 25;
        }

        .logo:hover {
            transform: scale(1.05);
        }

        .section-title {
            font-size: 1.5rem;
            letter-spacing: 3px;
            margin-bottom: 40px;
            text-align: center;
            opacity: 0.8;
        }

        /* Sidebar Styles */
        .nav-toggle {
            position: fixed;
            left: 30px;
            top: 30px;
            z-index: 1000;
            background: none;
            border: none;
            cursor: pointer;
            width: 30px;
            height: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 5px;
            transition: transform 0.3s ease;
        }

        .nav-toggle span {
            display: block;
            width: 100%;
            height: 2px;
            background-color: white;
            transition: all 0.3s ease;
        }

        .nav-toggle.active span:nth-child(1) {
            transform: translateY(8px) rotate(45deg);
        }

        .nav-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .nav-toggle.active span:nth-child(3) {
            transform: translateY(-8px) rotate(-45deg);
        }

        .sidebar {
            position: fixed;
            left: -300px;
            top: 0;
            width: 300px;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 999;
            padding: 100px 40px 0;
            transition: left 0.3s ease;
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .sidebar.active {
            left: 0;
        }

        .nav-category {
            font-size: 0.8rem;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 15px;
            margin-top: 20px;
        }

        .nav-category:first-child {
            margin-top: 0;
        }

        .nav-links {
            list-style: none;
            flex-grow: 1;
            margin-bottom: 20px;
        }

        .nav-links:last-of-type {
            margin-bottom: 0;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 1rem;
            letter-spacing: 1px;
            opacity: 0.7;
            transition: all 0.3s ease;
            display: block;
            padding: 10px 0;
        }

        .nav-links a:hover {
            opacity: 1;
            transform: translateX(5px);
        }

        .profile-link {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 1px;
            opacity: 0.7;
            transition: all 0.3s ease;
            padding: 20px 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            background-color: rgba(0, 0, 0, 0.95);
            width: 100%;
            margin-top: auto;
        }

        .profile-link:hover {
            opacity: 1;
        }

        .profile-icon {
            font-size: 1.2rem;
        }

        /* Cart Styles */
        .cart-container {
            padding: 100px 0;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
        }

        .cart-item:hover {
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
        }

        .remove-item-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 5px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .remove-item-btn:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.1);
        }

        .cart-item-image {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }

        .cart-item:hover .cart-item-image {
            transform: scale(1.05);
        }

        .cart-item-details {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .cart-item-name {
            font-size: 1.3rem;
            letter-spacing: 1px;
            margin: 0;
        }

        .cart-item-price {
            font-size: 1.2rem;
            opacity: 0.8;
            margin: 0;
        }

        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
        }

        .quantity-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .quantity-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .cart-item-quantity span {
            font-size: 1.2rem;
            min-width: 40px;
            text-align: center;
        }

        .cart-summary {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            margin-top: 40px;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        .checkout-btn {
            width: 100%;
            padding: 20px;
            background: white;
            color: black;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .checkout-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-2px);
        }

        .empty-cart {
            text-align: center;
            padding: 60px 0;
            font-size: 1.2rem;
            opacity: 0.8;
        }

        .continue-shopping {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .continue-shopping:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Floating Cubes Background */
        .cubes-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .cube {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: float 20s infinite linear;
            transform-style: preserve-3d;
            backdrop-filter: blur(5px);
        }

        /* Large cubes */
        .cube:nth-child(1) {
            width: 150px;
            height: 150px;
            top: 5%;
            left: 5%;
            animation-delay: 0s;
        }

        .cube:nth-child(2) {
            width: 180px;
            height: 180px;
            top: 15%;
            right: 10%;
            animation-delay: 3s;
        }

        /* Medium cubes */
        .cube:nth-child(3) {
            width: 120px;
            height: 120px;
            bottom: 20%;
            left: 15%;
            animation-delay: 6s;
        }

        .cube:nth-child(4) {
            width: 140px;
            height: 140px;
            top: 40%;
            right: 20%;
            animation-delay: 9s;
        }

        /* Small cubes */
        .cube:nth-child(5) {
            width: 90px;
            height: 90px;
            bottom: 30%;
            left: 30%;
            animation-delay: 12s;
        }

        .cube:nth-child(6) {
            width: 100px;
            height: 100px;
            top: 60%;
            right: 30%;
            animation-delay: 15s;
        }

        /* Additional cubes for better coverage */
        .cube:nth-child(7) {
            width: 80px;
            height: 80px;
            top: 25%;
            left: 40%;
            animation-delay: 2s;
        }

        .cube:nth-child(8) {
            width: 95px;
            height: 95px;
            bottom: 40%;
            right: 40%;
            animation-delay: 5s;
        }

        .cube:nth-child(9) {
            width: 75px;
            height: 75px;
            top: 70%;
            left: 25%;
            animation-delay: 8s;
        }

        .cube:nth-child(10) {
            width: 85px;
            height: 85px;
            bottom: 15%;
            right: 25%;
            animation-delay: 11s;
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotateX(0) rotateY(0) translateZ(0);
            }
            25% {
                transform: translateY(-150px) rotateX(90deg) rotateY(90deg) translateZ(50px);
            }
            50% {
                transform: translateY(0) rotateX(180deg) rotateY(180deg) translateZ(0);
            }
            75% {
                transform: translateY(150px) rotateX(270deg) rotateY(270deg) translateZ(-50px);
            }
            100% {
                transform: translateY(0) rotateX(360deg) rotateY(360deg) translateZ(0);
            }
        }

        @media (max-width: 768px) {
            .cart-item {
                flex-direction: column;
                text-align: center;
            }

            .cart-item-image {
                width: 100%;
                height: 200px;
            }

            .remove-item-btn {
                top: 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="cubes-container">
        <div class="cube"></div>
        <div class="cube"></div>
        <div class="cube"></div>
        <div class="cube"></div>
        <div class="cube"></div>
        <div class="cube"></div>
        <div class="cube"></div>
        <div class="cube"></div>
        <div class="cube"></div>
        <div class="cube"></div>
    </div>
    <button class="nav-toggle">
        <span></span>
        <span></span>
        <span></span>
    </button>
    <nav class="sidebar">
        <div class="nav-category">CATEGORIES</div>
        <ul class="nav-links">
            <li><a href="mens.html">MENS</a></li>
            <li><a href="womens.html">WOMENS</a></li>
            <li><a href="latest-releases.html">LATEST RELEASES</a></li>
        </ul>
        <a href="login.html" class="profile-link">
            <div class="profile-icon">👤</div>
            LOGIN / REGISTER
        </a>
    </nav>

    <section class="hero">
        <div class="container">
            <a href="kaze.html" style="text-decoration: none; color: inherit; display: block; text-align: center;">
                <h1 class="logo">Kaze</h1>
            </a>
        </div>
    </section>

    <section class="cart-container">
        <div class="container">
            <h2 class="section-title">SHOPPING CART</h2>
            <div class="cart-items"></div>
            <div class="cart-summary">
                <div class="cart-total">
                    <span>Total:</span>
                    <span>₹0.00</span>
                </div>
                <button class="checkout-btn">PROCEED TO CHECKOUT</button>
            </div>
        </div>
    </section>

    <script>
        // Sidebar Toggle
        const navToggle = document.querySelector('.nav-toggle');
        const sidebar = document.querySelector('.sidebar');
        const closeSidebar = () => {
            sidebar.classList.remove('active');
        };

        navToggle.addEventListener('click', () => {
            sidebar.classList.toggle('active');
            navToggle.classList.toggle('active');
        });

        // Close sidebar when clicking outside
        document.addEventListener('click', (e) => {
            if (!sidebar.contains(e.target) && !navToggle.contains(e.target)) {
                closeSidebar();
                navToggle.classList.remove('active');
            }
        });

        // Close sidebar with ESC key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeSidebar();
                navToggle.classList.remove('active');
            }
        });

        // Cart Functionality
        const cartItems = document.querySelector('.cart-items');
        const cartTotal = document.querySelector('.cart-total');
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function updateQuantity(id, change) {
            const item = cart.find(item => item.id === id);
            if (item) {
                const newQuantity = Math.max(1, item.quantity + change);
                item.quantity = newQuantity;
                localStorage.setItem('cart', JSON.stringify(cart));
                updateCart();
            }
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCart();
        }

        function updateCart() {
            if (cart.length === 0) {
                cartItems.innerHTML = `
                    <div class="empty-cart">
                        Your cart is empty
                        <br>
                        <a href="kaze.html" class="continue-shopping">Continue Shopping</a>
                    </div>
                `;
                cartTotal.innerHTML = `<span>Total:</span><span>₹0.00</span>`;
                return;
            }

            cartItems.innerHTML = cart.map(item => {
                // Parse price in case it's a string with currency symbol
                let price = typeof item.price === 'string' ? parseFloat(item.price.replace(/[^0-9.]/g, '')) : item.price;
                const itemTotal = price * item.quantity;
                return `
                    <div class="cart-item">
                        <button class="remove-item-btn" onclick="removeFromCart(${item.id})">×</button>
                        <img src="${item.image}" alt="${item.name}" class="cart-item-image">
                        <div class="cart-item-details">
                            <h3 class="cart-item-name">${item.name}</h3>
                            <p class="cart-item-price">₹${itemTotal.toLocaleString('en-IN')}</p>
                            <div class="cart-item-quantity">
                                <button class="quantity-btn" onclick="updateQuantity(${item.id}, -1)">-</button>
                                <span>${item.quantity}</span>
                                <button class="quantity-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // Calculate total using parsed price
            const total = cart.reduce((sum, item) => {
                let price = typeof item.price === 'string' ? parseFloat(item.price.replace(/[^0-9.]/g, '')) : item.price;
                return sum + (price * item.quantity);
            }, 0);
            cartTotal.innerHTML = `<span>Total:</span><span>₹${total.toLocaleString('en-IN')}</span>`;
        }

        // Initialize cart
        updateCart();
    </script>
</body>
</html>
