<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAZE | Register</title>
<style>
@font-face {
font-family: 'Hellshunx';
src: url('./fonts/Hellshunx.ttf') format('truetype');
font-weight: lighter;
font-style: normal;
font-display: swap;
}
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: 'Helvetica Neue', Arial, sans-serif;
}
body {
background-color: #000;
color: #fff;
min-height: 100vh;
display: flex;
justify-content: center;
align-items: center;
}
.register-container {
width: 100%;
max-width: 400px;
padding: 40px;
background: rgba(255, 255, 255, 0.05);
border-radius: 12px;
backdrop-filter: blur(10px);
border: 1px solid rgba(255, 255, 255, 0.1);
}
.logo {
font-family: 'Hellshunx', sans-serif;
font-size: 3rem;
text-align: center;
margin-bottom: 40px;
letter-spacing: 6px;
font-weight: 25;
text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
pointer-events: none;
}
.form-group {
margin-bottom: 20px
}
.form-group label {
display: block;
margin-bottom: 8px;
letter-spacing: 1px;
font-size: 0.9rem;
}
.form-group input {
width: 100%;
padding: 12px;
background: rgba(255, 255, 255, 0.1);
border: 1px solid rgba(255, 255, 255, 0.2);
border-radius: 6px;
color: white;
font-size: 1rem;
transition: all 0.3s ease;
}
.form-group input:focus {
outline: none;
border-color: rgba(255, 255, 255, 0.5);
background: rgba(255, 255, 255, 0.15);
}
.submit-btn {
width: 100%;
padding: 14px;
background: white;
color: black;
border: none;
border-radius: 6px;
font-size: 1rem;
letter-spacing: 1px;
cursor: pointer;
transition: all 0.3s ease;
margin-top: 20px;
}
.submit-btn:hover {
background: rgba(255, 255, 255, 0.9);
transform: translateY(-2px);
}
.links {
margin-top: 20px;
text-align: center;
}
.links a {
color: white;
text-decoration: none;
font-size: 0.9rem;
opacity: 0.7;
transition: opacity 0.3s ease;
}
.links a:hover {
opacity: 1;
}
.error-message {
color: #ff4444;
text-align: center;
margin-top: 10px;
font-size: 0.9rem;
display: none;
}
/* Sidebar Styles */
.nav-toggle {
position: fixed;
left: 30px;
top: 30px;
z-index: 1000;
background: none;
border: none;
cursor: pointer;
width: 30px;
height: 30px;
display: flex;
flex-direction: column;
justify-content: space-between;
padding: 5px;
transition: transform 0.3s ease;
}
.nav-toggle span {
display: block;
width: 100%;
height: 2px;
background-color: white;
transition: all 0.3s ease;
}
.nav-toggle.active span:nth-child(1) {
transform: translateY(8px) rotate(45deg);
}
.nav-toggle.active span:nth-child(2) {
opacity: 0;
}
.nav-toggle.active span:nth-child(3) {
transform: translateY(-8px) rotate(-45deg);
}
.sidebar {
position: fixed;
left: -300px;
top: 0;
width: 300px;
height: 100vh;
background-color: rgba(0, 0, 0, 0.95);
z-index: 999;
padding: 100px 40px 0;
transition: left 0.3s ease;
backdrop-filter: blur(10px);
border-right: 1px solid rgba(255, 255, 255, 0.1);
display: flex;
flex-direction: column;
justify-content: space-between;
}
.sidebar.active {
left: 0;
}
.nav-category {
font-size: 0.8rem;
letter-spacing: 3px;
color: rgba(255, 255, 255, 0.4);
margin-bottom: 15px;
margin-top: 20px;
}
.nav-category:first-child {
margin-top: 0;
}
.nav-links {
list-style: none;
flex-grow: 1;
margin-bottom: 20px;
}
.nav-links a {
color: white;
text-decoration: none;
font-size: 1rem;
letter-spacing: 1px;
opacity: 0.7;
transition: all 0.3s ease;
display: block;
padding: 10px 0;
}
.nav-links a:hover {
opacity: 1;
transform: translateX(5px);
}
.profile-link {
display: flex;
align-items: center;
gap: 12px;
color: white;
text-decoration: none;
font-size: 0.9rem;
letter-spacing: 1px;
opacity: 0.7;
transition: all 0.3s ease;
padding: 20px 40px;
border-top: 1px solid rgba(255, 255, 255, 0.1);
background-color: rgba(0, 0, 0, 0.95);
width: 100%;
margin-top: auto;
}
.profile-link:hover {
opacity: 1;
}
.profile-icon {
font-size: 1.2rem;
}
</style>
</head>
<body>
<div class="register-container">
<h1 class="logo"><a href="kaze.html" style="text-decoration: none; color: white;">Kaze</a></h1>
<form id="registerForm" method="POST" action="kaze.html">
<div class="form-group">
<label for="username">USERNAME</label>
<input type="text" id="username" name="username" required>
</div>
<div class="form-group">
<label for="email">EMAIL</label>
<input type="email" id="email" name="email" required>
</div>
<div class="form-group">
<label for="password">PASSWORD</label>
<input type="password" id="password" name="password" required>
</div>
<div class="form-group">
<label for="confirm_password">CONFIRM PASSWORD</label>
<input type="password" id="confirm_password" name="confirm_password" required>
</div>
<div class="error-message" id="errorMessage"></div>
<button type="submit" class="submit-btn">REGISTER</button>
</form>
<div class="links">
<a href="login.html">Already have an account? Login</a>
<br>
<a href="kaze.html" style="margin-top: 10px; display: inline-block;">Back to Home</a>
</div>
</div>
<button class="nav-toggle">
<span></span>
<span></span>
<span></span>
</button>
<div class="sidebar">
<ul class="nav-links">
<li class="nav-category">SHOP</li>
<li><a href="mens.html">Men's Collection</a></li>
<li><a href="womens.html">Women's Collection</a></li>
<li><a href="accessories.html">Accessories</a></li>
<li class="nav-category">ABOUT</li>
<li><a href="about.html">Our Story</a></li>
<li><a href="contact.html">Contact Us</a></li>
</ul>
<a href="profile.html" class="profile-link">
<span class="profile-icon">👤</span>
<span>Your Profile</span>
</a>
</div>
<script>
document.getElementById('registerForm').addEventListener('submit', function(e) {
    const username = document.getElementById('username').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm_password').value;
    const errorDiv = document.getElementById('errorMessage');
    
    errorDiv.style.display = 'none';
    
    if (!username || !email || !password || !confirmPassword) {
        e.preventDefault();
        errorDiv.style.display = 'block';
        errorDiv.textContent = 'All fields are required';
        return false;
    }

    // Add email format validation
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        e.preventDefault();
        errorDiv.style.display = 'block';
        errorDiv.textContent = 'Please enter a valid email address';
        return false;
    }

    if (password !== confirmPassword) {
        e.preventDefault();
        errorDiv.style.display = 'block';
        errorDiv.textContent = 'Passwords do not match';
        return false;
    }

    if (password.length < 6) {
        e.preventDefault();
        errorDiv.style.display = 'block';
        errorDiv.textContent = 'Password must be at least 6 characters long';
        return false;
    }
});
document.querySelector('.nav-toggle').addEventListener('click', function() {
    this.classList.toggle('active');
    document.querySelector('.sidebar').classList.toggle('active');
});
</script>
</body>
</html>
